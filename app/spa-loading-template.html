<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Incomplete Niwa Archives 終らない庭のアーカイヴ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      overflow: hidden;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: black;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin-bottom: 20px;
      border: 3px solid #0D1F1F;
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loading-wrapper">
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
